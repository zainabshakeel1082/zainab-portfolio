<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Password Generator</title><link rel='stylesheet' href='../project-style.css'></head><body><div class='proj-wrap'><h2>Password Generator</h2><div class='pwd'><label>Length<input id='len' type='number' value='12' min='4' max='64'></label><button id='gen'>Generate</button><input id='out' readonly></div><a class='back' href='../index.html'>← Back</a><script>function gen(n){const s='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()';let r='';for(let i=0;i<n;i++)r+=s[Math.floor(Math.random()*s.length)];return r}document.getElementById('gen').addEventListener('click',()=>{document.getElementById('out').value=gen(Number(document.getElementById('len').value))});</script></div></body></html>
