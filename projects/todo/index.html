<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>To-Do</title><link rel='stylesheet' href='../project-style.css'></head><body><div class='proj-wrap'><h2>To-Do List</h2><div class='todo'><input id='task' placeholder='New task'><button id='add'>Add</button><ul id='list'></ul></div><a class='back' href='../index.html'>← Back</a><script>const t=document.getElementById('task'),l=document.getElementById('list');document.getElementById('add').addEventListener('click',()=>{if(t.value.trim()){const li=document.createElement('li');li.textContent=t.value;li.addEventListener('click',()=>li.classList.toggle('done'));const del=document.createElement('button');del.textContent='x';del.addEventListener('click',()=>li.remove());li.appendChild(del);l.appendChild(li);t.value=''}});</script></div></body></html>
