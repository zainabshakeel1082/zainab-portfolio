<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Calculator</title><link rel='stylesheet' href='../project-style.css'></head><body><div class='proj-wrap'><h2>Calculator</h2><div class='calc'><input id='display' readonly><div class='keys'><button>7</button><button>8</button><button>9</button><button>/</button><button>4</button><button>5</button><button>6</button><button>*</button><button>1</button><button>2</button><button>3</button><button>-</button><button>0</button><button>.</button><button>=</button><button>+</button></div></div><a class='back' href='../index.html'>← Back</a><script>const d=document.getElementById('display');document.querySelectorAll('.keys button').forEach(b=>b.addEventListener('click',()=>{if(b.textContent==='='){try{d.value=eval(d.value)}catch{d.value='Err'}}else{d.value+=b.textContent}}));</script></div></body></html>
