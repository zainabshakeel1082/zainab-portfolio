<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Quiz Game</title><link rel='stylesheet' href='../project-style.css'></head><body><div class='proj-wrap'><h2>Quiz Game</h2><div id='game'><div id='q'></div><div id='opts'></div><div id='status'></div></div><a class='back' href='../index.html'>← Back</a><script>const qs=[{q:'Capital of Pakistan?',a:['Lahore','Islamabad','Karachi'],c:1},{q:'HTML stands for?',a:['Hyper Text Markup','High Text','Home'],c:0}];let i=0,score=0;function render(){const cur=qs[i];document.getElementById('q').textContent=cur.q;const opts=document.getElementById('opts');opts.innerHTML='';cur.a.forEach((o,idx)=>{const b=document.createElement('button');b.textContent=o;b.addEventListener('click',()=>{if(idx===cur.c){score++;document.getElementById('status').textContent='Correct!'}else document.getElementById('status').textContent='Wrong';i++;if(i>=qs.length){opts.innerHTML=`<p>Score: ${score}/${qs.length}</p>`;return;}setTimeout(()=>{render();document.getElementById('status').textContent='';},600)});opts.appendChild(b)});}render();</script></div></body></html>
