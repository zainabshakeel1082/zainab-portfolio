<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Weather Demo</title><link rel='stylesheet' href='../project-style.css'></head><body><div class='proj-wrap'><h2>Weather (Mock Demo)</h2><div class='weather'><input id='city' placeholder='Enter city'><button id='get'>Get</button><div id='out'></div></div><a class='back' href='../index.html'>← Back</a><script>document.getElementById('get').addEventListener('click',()=>{const c=document.getElementById('city').value||'Karachi';const o=document.getElementById('out');o.innerHTML=`<h3>${c}</h3><p>Temperature: 28°C</p><p>Condition: Partly Cloudy</p>`});</script></div></body></html>
